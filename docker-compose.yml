services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: libratrack_php
      MYSQL_USER: libratrack_user
      MYSQL_PASSWORD: libratrack_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: libratrack_php
      DB_USER: libratrack_user
      DB_PASSWORD: libratrack_pass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor

volumes:
  mysql_data:
